# HTTPS server block with modern security configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name demo.yourdomain.com;  # Change to your domain

    # SSL Certificate paths
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Include SSL parameters
    include /etc/nginx/snippets/ssl-params.conf;

    # Include security headers
    include /etc/nginx/snippets/security-headers.conf;

    # Include rate limiting
    include /etc/nginx/snippets/rate-limits.conf;

    # Access and error logs with JSON format
    access_log /var/log/nginx/access-ssl.json json_combined;
    error_log /var/log/nginx/error-ssl.log warn;

    # Maximum request body size (for file uploads)
    client_max_body_size 200M;
    client_body_buffer_size 128k;

    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;
    send_timeout 60s;

    # Health check endpoint
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # Metrics endpoint (internal only)
    location /metrics {
        allow 127.0.0.1;
        allow 172.20.0.0/16;  # Docker network
        deny all;

        proxy_pass http://localhost:9113/metrics;
        proxy_set_header Host $host;
    }

    # Main Streamlit Dashboard
    location / {
        # Rate limiting for general requests
        limit_req zone=general burst=20 nodelay;
        limit_conn addr 10;

        proxy_pass http://streamlit;
        include /etc/nginx/snippets/proxy-params.conf;

        # WebSocket support for Streamlit
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Disable buffering for Streamlit
        proxy_buffering off;
        proxy_request_buffering off;

        # Security headers for Streamlit
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # FastAPI Backend
    location /api/ {
        # Rate limiting for API
        limit_req zone=api burst=50 nodelay;
        limit_conn addr 20;

        proxy_pass http://backend/;
        include /etc/nginx/snippets/proxy-params.conf;

        # API specific settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # API security
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # CORS headers for API (if not handled by backend)
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Max-Age 86400 always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # WebSocket endpoint for backend
    location /ws {
        # Rate limiting for WebSocket
        limit_req zone=general burst=10 nodelay;

        proxy_pass http://backend/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        include /etc/nginx/snippets/proxy-params.conf;

        # WebSocket specific
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Next.js Dashboard (alternative frontend)
    location /dashboard/ {
        # Rate limiting
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://frontend/;
        include /etc/nginx/snippets/proxy-params.conf;

        # Next.js specific
        proxy_cache_bypass $http_upgrade;
        proxy_hide_header X-Powered-By;
    }

    # Static files with caching
    location /output/ {
        alias /usr/share/nginx/html/output/;

        # Cache headers
        expires 1d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        # CORS for media files
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

        # Security
        location ~* \.(php|php3|php4|php5|phtml|pl|py|rb|sh|bash)$ {
            deny all;
        }
    }

    location /videos/ {
        alias /usr/share/nginx/html/videos/;

        # Cache headers
        expires 1d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        # Enable byte-range requests for video streaming
        add_header Accept-Ranges bytes always;

        # CORS for media files
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

        # Security
        location ~* \.(php|php3|php4|php5|phtml|pl|py|rb|sh|bash)$ {
            deny all;
        }

        # MP4 streaming
        mp4;
        mp4_buffer_size 1m;
        mp4_max_buffer_size 5m;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Custom error pages
    error_page 400 /errors/400.html;
    error_page 401 /errors/401.html;
    error_page 403 /errors/403.html;
    error_page 404 /errors/404.html;
    error_page 500 502 503 504 /errors/50x.html;

    location ^~ /errors/ {
        internal;
        root /usr/share/nginx/html;
    }

    # Security: Deny access to sensitive files
    location ~* \.(git|env|yml|yaml|ini|log|conf|config|bak|backup|swp)$ {
        deny all;
        return 404;
    }
}

# HTTP server block - Redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name demo.yourdomain.com;

    # Allow Let's Encrypt ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        allow all;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}