# Main server block for HTTP
server {
    listen 80;
    listen [::]:80;
    server_name demo.yourdomain.com;  # Change to your domain

    # Redirect all HTTP to HTTPS (uncomment in production)
    # return 301 https://$server_name$request_uri;

    # For development without SSL
    include /etc/nginx/snippets/proxy-params.conf;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Streamlit Dashboard (main app)
    location / {
        proxy_pass http://streamlit;

        # WebSocket support for Streamlit
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;

        # Streamlit specific
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for Streamlit
        proxy_buffering off;

        # Rate limiting
        limit_req zone=general burst=20 nodelay;
    }

    # FastAPI Backend
    location /api/ {
        proxy_pass http://backend/;
        include /etc/nginx/snippets/proxy-params.conf;

        # API specific timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Rate limiting for API
        limit_req zone=api burst=50 nodelay;
    }

    # WebSocket endpoint for backend
    location /ws {
        proxy_pass http://backend/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # Next.js Dashboard (alternative frontend)
    location /dashboard/ {
        proxy_pass http://frontend/;
        include /etc/nginx/snippets/proxy-params.conf;

        # Next.js specific
        proxy_cache_bypass $http_upgrade;
    }

    # Static files (images, videos)
    location /output/ {
        alias /usr/share/nginx/html/output/;
        expires 1d;
        add_header Cache-Control "public, immutable";

        # CORS headers for media files
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }

    location /videos/ {
        alias /usr/share/nginx/html/videos/;
        expires 1d;
        add_header Cache-Control "public, immutable";

        # CORS headers for media files
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";

        # Enable byte-range requests for video streaming
        add_header Accept-Ranges bytes;
    }
}

