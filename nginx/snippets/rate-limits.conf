# Rate limiting configuration for DDoS protection

# Note: Zone definitions must be in http context (nginx.conf)
# This file contains the application of those zones

# General rate limiting for dashboard access
# Applied in location / block
# limit_req zone=general burst=20 nodelay;

# API rate limiting with higher threshold
# Applied in location /api/ block
# limit_req zone=api burst=50 nodelay;

# Authentication rate limiting (strict)
# Applied in location /api/auth block
# limit_req zone=auth burst=10 delay=5;

# Connection limiting per IP
# Applied per location as needed
# limit_conn addr 10;

# Request size limits
client_body_buffer_size 128k;
client_max_body_size 200M;  # Adjust based on upload requirements
client_header_buffer_size 1k;
large_client_header_buffers 4 8k;

# Timeout settings to prevent slowloris attacks
client_body_timeout 30s;
client_header_timeout 30s;
keepalive_timeout 65s;
send_timeout 30s;
reset_timedout_connection on;

# Limit request methods
if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$) {
    return 405;
}

# Block suspicious user agents
if ($http_user_agent ~* (wget|curl|perl|python|nikto|scan|spider|bot|crawl)) {
    return 403;
}

# Block referrer spam
if ($http_referer ~* (poker|porn|sex|teen|viagra|casino)) {
    return 403;
}