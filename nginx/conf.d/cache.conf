# Proxy cache configuration for performance

# Cache paths
proxy_cache_path /var/cache/nginx/proxy levels=1:2 keys_zone=app_cache:10m
                 max_size=1g inactive=60m use_temp_path=off;

proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:10m
                 max_size=2g inactive=7d use_temp_path=off;

# Cache key
proxy_cache_key "$scheme$request_method$host$request_uri";

# Cache settings
proxy_cache_methods GET HEAD;
proxy_cache_valid 200 301 302 10m;
proxy_cache_valid 404 1m;
proxy_cache_valid any 1m;

# Cache bypass conditions
proxy_cache_bypass $http_upgrade $http_cache_control;
proxy_no_cache $http_upgrade $http_cache_control;

# Add cache status header for debugging
add_header X-Cache-Status $upstream_cache_status;

# Buffer settings for better performance
proxy_buffering on;
proxy_buffer_size 4k;
proxy_buffers 8 4k;
proxy_busy_buffers_size 8k;
proxy_temp_file_write_size 8k;

# Upstream response buffering
proxy_max_temp_file_size 2048m;
proxy_temp_path /var/cache/nginx/temp;