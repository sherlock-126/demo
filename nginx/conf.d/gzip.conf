# Gzip compression settings for performance

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_disable "msie6";

# MIME types to compress
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    text/cache-manifest
    application/json
    application/javascript
    application/xml+rss
    application/rss+xml
    application/atom+xml
    application/ld+json
    application/manifest+json
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/x-javascript
    font/opentype
    image/svg+xml
    image/x-icon
    text/x-component
    text/x-cross-domain-policy;