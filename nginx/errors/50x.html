<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Temporarily Unavailable</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
        }
        h1 {
            font-size: 6rem;
            margin: 0 0 1rem;
            opacity: 0.9;
        }
        h2 {
            font-size: 2rem;
            margin: 0 0 1.5rem;
            font-weight: 300;
        }
        p {
            font-size: 1.1rem;
            margin: 1.5rem 0;
            opacity: 0.9;
            line-height: 1.6;
        }
        .status {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            margin: 2rem 0;
        }
        a {
            color: #fff;
            text-decoration: underline;
            opacity: 0.9;
        }
        a:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>503</h1>
        <h2>Service Temporarily Unavailable</h2>
        <p>We're currently performing maintenance or experiencing high traffic. The service will be back online shortly.</p>
        <div class="status">Please try again in a few moments</div>
        <p>If this problem persists, please contact the system administrator.</p>
    </div>
</body>
</html>
