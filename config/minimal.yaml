layout:
  width: 1080
  height: 1920
  padding: 80
  split_ratio: 0.5

colors:
  background:
    main: "#FAFAFA"
    wrong: "#FFFFFF"
    right: "#FFFFFF"
    divider: "#E0E0E0"
  text:
    title: "#212121"
    subtitle: "#757575"
    label_wrong: "#F44336"
    label_right: "#4CAF50"
    content: "#424242"

fonts:
  title:
    path: "assets/fonts/Roboto-Bold.ttf"
    size: 64
  subtitle:
    path: "assets/fonts/Roboto-Regular.ttf"
    size: 42
  label:
    path: "assets/fonts/Roboto-Black.ttf"
    size: 56
  text:
    path: "assets/fonts/Roboto-Regular.ttf"
    size: 38

icons:
  wrong: "assets/icons/x-mark.png"
  right: "assets/icons/check-mark.png"
  size: 100

logo:
  path: "assets/logo/placeholder.png"
  position: "bottom-center"
  size: [150, 60]
  opacity: 0.7