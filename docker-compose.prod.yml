version: '3.8'

# Production overrides for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

networks:
  demo-network:
    external: true  # Use existing network in production

services:
  streamlit:
    image: demo-streamlit:${VERSION:-latest}
    restart: always
    ports:
      - "127.0.0.1:8501:8501"  # Bind to localhost only (Nginx will proxy)
    environment:
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=200
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=true
      - LOG_LEVEL=WARNING
    volumes:
      # Remove source code mounts in production
      - ./data:/app/data
      - ./output:/app/output
      - ./videos:/app/videos
      - ./audio:/app/audio:ro
      - ./assets:/app/assets:ro
      - ./.auth:/app/.auth
      - ./logs:/app/logs
      - ./cache:/app/cache
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
        reservations:
          cpus: '0.3'
          memory: 1.5G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=streamlit,env=production"

  backend:
    image: demo-backend:${VERSION:-latest}
    restart: always
    ports:
      - "127.0.0.1:8000:8000"  # Bind to localhost only
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}  # Must be set in production
      - CORS_ORIGINS=${CORS_ORIGINS}
      - LOG_LEVEL=WARNING
      - WORKERS=2  # Number of uvicorn workers
    volumes:
      # Remove source code mounts in production
      - ./data:/app/data
      - ./output:/app/output
      - ./videos:/app/videos
      - ./audio:/app/audio:ro
      - ./assets:/app/assets:ro
      - ./.auth:/app/.auth
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
        reservations:
          cpus: '0.3'
          memory: 1.5G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=backend,env=production"
    profiles:
      - ""  # Always start in production

  frontend:
    image: demo-frontend:${VERSION:-latest}
    restart: always
    ports:
      - "127.0.0.1:3001:3000"  # Bind to localhost only
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api  # Use relative URL through Nginx
      - NEXT_PUBLIC_WS_URL=/ws    # Use relative URL through Nginx
    volumes:
      - node_modules_frontend:/app/node_modules
      - ./output:/app/public/output:ro
      - ./videos:/app/public/videos:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
        reservations:
          cpus: '0.3'
          memory: 1.5G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=frontend,env=production"
    profiles:
      - ""  # Always start in production

  # Nginx reverse proxy service (production only)
  nginx:
    image: nginx:alpine
    container_name: demo-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-available:/etc/nginx/sites-available:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
      # Static files
      - ./output:/usr/share/nginx/html/output:ro
      - ./videos:/usr/share/nginx/html/videos:ro
    networks:
      - demo-network
    depends_on:
      - streamlit
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=nginx,env=production"