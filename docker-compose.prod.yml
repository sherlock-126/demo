version: '3.8'

# Production overrides for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

networks:
  demo-network:
    external: true  # Use existing network in production

services:
  streamlit:
    image: demo-streamlit:${VERSION:-latest}
    restart: always
    ports:
      - "127.0.0.1:8501:8501"  # Bind to localhost only (Nginx will proxy)
    environment:
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=200
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=true
      - LOG_LEVEL=WARNING
    volumes:
      # Remove source code mounts in production
      - ./data:/app/data
      - ./output:/app/output
      - ./videos:/app/videos
      - ./audio:/app/audio:ro
      - ./assets:/app/assets:ro
      - ./.auth:/app/.auth
      - ./logs:/app/logs
      - ./cache:/app/cache
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
        reservations:
          cpus: '0.3'
          memory: 1.5G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=streamlit,env=production"

  backend:
    image: demo-backend:${VERSION:-latest}
    restart: always
    ports:
      - "127.0.0.1:8000:8000"  # Bind to localhost only
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}  # Must be set in production
      - CORS_ORIGINS=${CORS_ORIGINS}
      - LOG_LEVEL=WARNING
      - WORKERS=2  # Number of uvicorn workers
    volumes:
      # Remove source code mounts in production
      - ./data:/app/data
      - ./output:/app/output
      - ./videos:/app/videos
      - ./audio:/app/audio:ro
      - ./assets:/app/assets:ro
      - ./.auth:/app/.auth
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
        reservations:
          cpus: '0.3'
          memory: 1.5G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=backend,env=production"
    profiles:
      - ""  # Always start in production

  frontend:
    image: demo-frontend:${VERSION:-latest}
    restart: always
    ports:
      - "127.0.0.1:3001:3000"  # Bind to localhost only
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api  # Use relative URL through Nginx
      - NEXT_PUBLIC_WS_URL=/ws    # Use relative URL through Nginx
    volumes:
      - node_modules_frontend:/app/node_modules
      - ./output:/app/public/output:ro
      - ./videos:/app/public/videos:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
        reservations:
          cpus: '0.3'
          memory: 1.5G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=frontend,env=production"
    profiles:
      - ""  # Always start in production

  # Nginx reverse proxy service with enhanced security (production only)
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile.nginx
    image: demo-nginx:${VERSION:-latest}
    container_name: demo-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:9113:9113"  # Prometheus metrics (local only)
    environment:
      - DOMAIN=${DOMAIN:-demo.yourdomain.com}
      - SSL_EMAIL=${SSL_EMAIL:-admin@yourdomain.com}
      - MODSECURITY_MODE=${MODSECURITY_MODE:-DetectionOnly}
    volumes:
      # Configuration files
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-available:/etc/nginx/sites-available:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/modsec:/etc/nginx/modsec:ro
      # SSL certificates
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Logs
      - ./logs/nginx:/var/log/nginx
      # Cache
      - ./cache/nginx:/var/cache/nginx
      # Static files
      - ./output:/usr/share/nginx/html/output:ro
      - ./videos:/usr/share/nginx/html/videos:ro
      # Error pages
      - ./nginx/errors:/usr/share/nginx/html/errors:ro
      # ACME challenge for Let's Encrypt
      - ./nginx/ssl/.well-known:/usr/share/nginx/html/.well-known:ro
    networks:
      - demo-network
    depends_on:
      - streamlit
      - backend
      - frontend
    healthcheck:
      test: |
        CMD sh -c '
        nginx -t &&
        curl -f http://localhost/health &&
        [ $$(curl -s -o /dev/null -w "%{http_code}" http://localhost/) -eq 200 ]
        '
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "service=nginx,env=production"
    cap_add:
      - NET_ADMIN  # For fail2ban IP blocking
    security_opt:
      - no-new-privileges:true
      - apparmor:docker-nginx  # If AppArmor is available